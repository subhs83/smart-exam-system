{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>All Schools</h3>
    <a href="{{ url_for('super_admin.add_school') }}" class="btn btn-primary">
        ➕ Add School
    </a>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for school in schools %}
        <tr>
            <td>{{ school.id }}</td>
            <td>{{ school.name }}</td>
            <td>{{ school.email }}</td>
            <td>
                {% if school.is_active == 1 %}
                    <span class="badge bg-success">Active</span>
                {% else %}
                    <span class="badge bg-danger">Inactive</span>
                {% endif %}
            </td>
            <td>
                <!-- Admin Button -->
                <a href="{{ url_for('super_admin.view_school_admins', school_id=school.id) }}"
                class="btn btn-sm btn-primary">
                 Admins
             </a>
                <!-- Edit Button -->
                <a href="{{ url_for('super_admin.edit_school', school_id=school.id) }}"
                   class="btn btn-sm btn-warning">
                    Edit
                </a>
            
                <!-- Toggle Button (POST method) -->
                <form method="POST"
                      action="{{ url_for('super_admin.toggle_school', school_id=school.id) }}"
                      style="display:inline;">
                    <button type="submit"
                            class="btn btn-sm {% if school.is_active == 1 %}btn-danger{% else %}btn-success{% endif %}">
                        {% if school.is_active == 1 %}
                            Deactivate
                        {% else %}
                            Activate
                        {% endif %}
                    </button>
                </form>
            
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
