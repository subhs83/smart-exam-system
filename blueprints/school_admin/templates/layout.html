{% extends "base.html" %}

{% block content %}
<div class="d-flex">

  <!-- Sidebar -->
  <nav class="bg-dark text-white p-3 vh-100" style="width:240px;">
    <h4 class="mb-4 fw-bold">School Admin</h4>
  
    <ul class="nav flex-column">
  
      <li class="nav-item mb-2">
        <a href="{{ url_for('school_admin.dashboard') }}"
           class="nav-link d-flex align-items-center {% if active_page=='dashboard' %}active bg-light text-dark border-start border-3 border-primary{% else %}text-white{% endif %}">
           <i class="bi bi-speedometer2 me-2"></i> Dashboard
        </a>
      </li>
  
      <li class="nav-item mb-2">
        <a href="{{ url_for('school_admin.view_teachers') }}"
           class="nav-link d-flex align-items-center {% if active_page=='teachers' %}active bg-light text-dark border-start border-3 border-primary{% else %}text-white{% endif %}">
           <i class="bi bi-person-badge me-2"></i> Teachers
        </a>
      </li>
  
      <li class="nav-item mb-2">
        <a href="{{ url_for('school_admin.teachers') }}"
           class="nav-link d-flex align-items-center {% if active_page=='exams' %}active bg-light text-dark border-start border-3 border-primary{% else %}text-white{% endif %}">
           <i class="bi bi-journal-text me-2"></i> Exams
        </a>
      </li>
  
      <li class="nav-item mb-2">
        <a href="{{ url_for('school_admin.reports') }}"
          class="nav-link text-white {% if active_page=='reports' %}active bg-primary{% endif %}">
          <i class="bi bi-download me-2"></i> Reports
        </a>

      </li>
  
      <li class="nav-item mt-4">
        <a href="{{ url_for('auth.logout') }}"
           class="nav-link d-flex align-items-center text-danger fw-bold">
           <i class="bi bi-box-arrow-right me-2"></i> Logout
        </a>
      </li>
  
    </ul>
  </nav>
  


  <!-- Main Page Content -->
  <div class="flex-grow-1 p-4">

    {% block admin_content %}
    {% endblock %}

  </div>

</div>
{% endblock %}
