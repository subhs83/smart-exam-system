{% extends "layout.html" %}

{% block admin_content %}

<h3>Teacher Exams</h3>

<table class="table table-striped">
<thead>
<tr>
<th>SN</th>
<th>Exam</th>
<th>Attempts</th>
<th>Results</th>
<th>Leaderboard</th>
</tr>
</thead>
<tbody>
{% for exam in exams %}
<tr>
<td>{{ loop.index }}</td> 
<td>{{ exam.title }}</td>
<td>{{ exam.student_attempts }}</td>
<td>
    <a href="{{ url_for('school_admin.admin_exam_results', exam_id=exam.id) }}"
       class="btn btn-success btn-sm">View</a>
</td>
<td>
    <a href="{{ url_for('school_admin.admin_exam_leaderboard', exam_id=exam.id) }}"
       class="btn btn-warning btn-sm">View</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>

<a href="{{ url_for('school_admin.teachers') }}" class="btn btn-secondary mt-2">Back to Teachers</a>

{% endblock %}
