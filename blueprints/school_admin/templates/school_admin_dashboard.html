{% extends "layout.html" %}

{% block admin_content %}

<h2 class="mb-4 text-primary fw-bold">School Admin Dashboard</h2>

<!-- Statistics -->
<div class="row mb-4 g-3">

  <div class="col-md-3">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <i class="bi bi-person-badge fs-2 text-primary"></i>
        <h3 class="fw-bold mt-2">{{ total_teachers }}</h3>
        <p class="text-muted mb-0">Total Teachers</p>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <i class="bi bi-journal-text fs-2 text-success"></i>
        <h3 class="fw-bold mt-2">{{ total_exams }}</h3>
        <p class="text-muted mb-0">Total Exams</p>
      </div>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <i class="bi bi-journal-text fs-2 text-success"></i>
        <h3 class="fw-bold mt-2">{{ total_attempts }}</h3>
        <p class="text-muted mb-0">Student Attempts</p>
      </div>
    </div>
  </div>
</div>

<!-- Cards -->
<div class="row g-4">

  <!-- Teachers -->
  <div class="col-md-6 col-lg-3">
    <div class="card shadow-sm text-center">
      <div class="card-body">
        <h6>Teachers</h6>
        <a href="{{ url_for('school_admin.add_teacher') }}" class="btn btn-primary btn-sm">Add</a>
        <a href="{{ url_for('school_admin.view_teachers') }}" class="btn btn-outline-secondary btn-sm">Manage</a>
      </div>
    </div>
  </div>

</div>

<!-- Download Report Card -->
<div class="row mt-4">
  <div class="col-md-12">
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">Download Report</h5>
        <form action="{{ url_for('school_admin.download_report') }}" method="get" class="row g-2 align-items-center">
          
          <div class="col-auto">
            <label for="report_type" class="form-label">Report Type:</label>
            <select id="report_type" name="type" class="form-select" onchange="toggleExamDropdown()">
              <option value="school">Entire School</option>
              <option value="exam">Single Exam</option>
            </select>
          </div>

          <div class="col-auto" id="exam_dropdown" style="display: none;">
            <label for="exam_id" class="form-label">Select Exam:</label>
            <select id="exam_id" name="exam_id" class="form-select">
              {% for exam in exams %}
                <option value="{{ exam.id }}">{{ exam.title }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-auto align-self-end">
            <button type="submit" class="btn btn-success">Download Report</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function toggleExamDropdown() {
    var reportType = document.getElementById('report_type').value;
    var examDiv = document.getElementById('exam_dropdown');
    examDiv.style.display = reportType === 'exam' ? 'block' : 'none';
}
</script>
{% endblock %}
