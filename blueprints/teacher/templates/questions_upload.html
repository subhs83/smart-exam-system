<!-- teacher/templates/questions_upload.html -->
{% extends "base.html" %}
{% block title %}Upload Questions{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Upload Questions for Exam ID: {{ exam_id }}</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Select Excel File</label>
            <input type="file" name="excel_file" accept=".xlsx,.xls" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload</button>
        <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-secondary">Back</a>
    </form>
    <p class="mt-3 text-muted">Format: Question, Option A, Option B, Option C, Option D, Answer, Marks</p>
</div>
{% endblock %}
