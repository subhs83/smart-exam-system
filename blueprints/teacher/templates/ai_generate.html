{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h3>Generate Questions with AI</h3>

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Upload PDF or Image</label>
<input type="file" name="file" class="form-control">
</div>

<div class="mb-3">
<label>Or Paste Text</label>
<textarea name="text_input" class="form-control" rows="5"></textarea>
</div>

<div class="mb-3">
<label>Number of Questions</label>
<input type="number" name="num_questions" value="5" class="form-control">
</div>

<div class="mb-3">
<label>Difficulty</label>
<select name="difficulty" class="form-control">
<option value="Easy">Easy</option>
<option value="Medium">Medium</option>
<option value="Hard">Hard</option>
</select>
</div>

<div class="mb-3">
<label>Marks Per Question</label>
<input type="number" name="marks" value="1" class="form-control">
</div>

<div class="mb-3">
<label>Negative Marks</label>
<input type="number" name="negative" value="0" class="form-control">
</div>

<button class="btn btn-primary">Generate Questions</button>

</form>

</div>

{% endblock %}
