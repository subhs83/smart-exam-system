<!-- teacher/templates/exams_create.html -->
{% extends "base.html" %}
{% block title %}Create Exam{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Create Exam</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Exam Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Duration (minutes)</label>
            <input type="number" name="duration" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Marks per Question</label>
            <input type="number" name="marks" class="form-control" value="1" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Negative Marks per Wrong Answer</label>
            <input type="number" name="negative" class="form-control" value="0">
        </div>
        <div class="mb-3">
            <label class="form-label">Max Attempts per Student</label>
            <input type="number" name="max_attempts" class="form-control" value="1" required>
        </div>
        <button type="submit" class="btn btn-primary">Create Exam</button>
        <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
