{% extends "base.html" %}
{% block content %}

<h3 class="mb-4">Add School</h3>

<form method="POST"
      action="{{ url_for('super_admin.add_school') }}"
      class="card p-4 shadow-sm">

    <input type="hidden" name="demo_id" value="{{ demo.id if demo else '' }}">

    <div class="mb-3">
        <label class="form-label">School Name</label>
        <input type="text" name="name" class="form-control"
               value="{{ demo.school_name if demo else '' }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" name="address" class="form-control"
       placeholder="Enter full school address">
    </div>

    <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control"
               value="{{ demo.phone if demo else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               value="{{ demo.email if demo else '' }}">
    </div>

    <button type="submit" class="btn btn-success">
        Create School
    </button>

    <a href="{{ url_for('super_admin.schools') }}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
