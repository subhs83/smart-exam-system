{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Demo Requests</h2>

    <table class="table table-bordered mt-3">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>School</th>
                <th>Status</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for d in demos %}
            <tr>
                <td>{{ d.name }}</td>
                <td>{{ d.email }}</td>
                <td>{{ d.school_name }}</td>
                <td>
                    <span class="badge bg-{% if d.status=='new' %}warning{% elif d.status=='contacted' %}info{% else %}success{% endif %}">
                        {{ d.status }}
                    </span>
                </td>
                <td>{{ d.created_at.strftime('%Y-%m-%d') }}</td>
            
                <td>
                    <form method="POST" action="{{ url_for('super_admin.update_demo_status', id=d.id, status='contacted') }}" style="display:inline;">
                        <button class="btn btn-sm btn-info">Contacted</button>
                    </form>
            
                    <form method="POST" action="{{ url_for('super_admin.update_demo_status', id=d.id, status='closed') }}" style="display:inline;">
                        <button class="btn btn-sm btn-success">Close</button>
                    </form>
            
                    <form method="POST" action="{{ url_for('super_admin.delete_demo', id=d.id) }}" style="display:inline;">
                        <button class="btn btn-sm btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
            </tbody>
    </table>
</div>
{% endblock %}
