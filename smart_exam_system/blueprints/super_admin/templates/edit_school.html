    {% extends "base.html" %}

    {% block content %}
    <div class="container mt-4">
        <h2>Edit School</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">School Name</label>
                <input type="text" name="name" class="form-control" value="{{ school.name }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" name="address" class="form-control" value="{{ school.address }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ school.phone }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ school.email }}">
            </div>
            <div class="mb-3">
                <label class="form-label">School Logo</label>
            
                {% if school.logo %}
                    <div class="mb-2">
                        <img src="{{ url_for('static', filename='uploads/schools/' + school.logo) }}"
                             width="80" height="80" style="object-fit:cover; border-radius:8px;">
                    </div>
                {% endif %}
            
                <input type="file" name="logo" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Update School</button>
            <a href="{{ url_for('super_admin.schools') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
    {% endblock %}
